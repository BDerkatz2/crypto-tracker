services:
  - type: web
    name: crypto-tracker-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./crypto_tracker.db
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: REDIS_CACHE_EXPIRY
        value: "300"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://crypto-tracker-1-kfyi.onrender.com", "http://localhost:3000"]'
      - key: COINGECKO_API_KEY
        value: ''

  - type: web
    name: crypto-tracker-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://crypto-tracker-backend.onrender.com/api/v1

